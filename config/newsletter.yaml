# =============================================================================
# DailyCTI -- Newsletter Configuration
# =============================================================================
# Defines the structure, schedule, and delivery settings for the daily
# cybersecurity newsletter.
# =============================================================================

# --- Newsletter Identity ---
newsletter:
  name: "DailyCTI Daily CTI Brief"
  tagline: "Your daily cybersecurity intelligence, curated by AI"
  from_name: "DailyCTI Intelligence"
  from_email: "${AWS_SES_SENDER_EMAIL}"
  reply_to: "newsletter@yourdomain.com"
  website_url: "https://yourdomain.com/archive"

# --- Schedule ---
schedule:
  # Cron expression (UTC)
  cron: "0 5 * * *"              # 05:00 UTC daily (Mon-Sun)
  timezone: "UTC"
  # Skip weekends? Set to true for Mon-Fri only
  weekdays_only: false

# --- Newsletter Sections ---
# Order matters -- sections appear in this order in the newsletter
sections:
  - id: executive_tldr
    name: "Executive TL;DR"
    description: "Top 3-5 stories of the day in bullet-point format"
    max_items: 5
    template: "sections/executive_tldr.mjml"
    # Auto-generated by Claude from top-scored articles
    ai_generated: true
    enabled: true

  - id: critical_vulns
    name: "Critical Vulnerabilities"
    description: "CVEs with CVSS >= 9.0, actively exploited vulnerabilities, zero-days"
    max_items: 10
    template: "sections/critical_vulns.mjml"
    filters:
      min_cvss: 9.0
      entity_types: ["cve"]
      include_cisa_kev: true
    enabled: true

  - id: exploits_zerodays
    name: "Active Exploits & Zero-Days"
    description: "Weaponized exploits, proof-of-concept code, in-the-wild exploitation"
    max_items: 8
    template: "sections/exploits_zerodays.mjml"
    filters:
      requires_exploit: true
      sources: ["Exploit-DB", "CISA KEV Catalog", "Google Project Zero"]
    enabled: true

  - id: threat_actors
    name: "Threat Actor Spotlight"
    description: "APT campaigns, ransomware operations, new TTPs observed"
    max_items: 6
    template: "sections/threat_actors.mjml"
    filters:
      entity_types: ["threat_actor", "campaign"]
      include_mitre_attack: true
    enabled: true

  - id: breaches
    name: "Data Breaches & Incidents"
    description: "Confirmed data breaches, incident disclosures, leak site activity"
    max_items: 6
    template: "sections/breaches.mjml"
    filters:
      keywords: ["breach", "leaked", "exposed", "compromised", "ransomware victim"]
    enabled: true

  - id: malware_tooling
    name: "Malware & Tooling"
    description: "New malware families, variant updates, offensive/defensive tool releases"
    max_items: 6
    template: "sections/malware_tooling.mjml"
    filters:
      entity_types: ["malware", "tool"]
    enabled: true

  - id: vendor_advisories
    name: "Vendor Advisories & Patches"
    description: "Security advisories from major vendors, Patch Tuesday coverage"
    max_items: 10
    template: "sections/vendor_advisories.mjml"
    filters:
      sources:
        - "Microsoft MSRC"
        - "Google Project Zero"
        - "Google TAG"
        - "Cisco Talos Blog"
        - "Fortinet FortiGuard"
        - "GitGuardian Detection Engine"
      categories: ["vendor_advisory"]
    enabled: true

  - id: policy_compliance
    name: "Policy, Compliance & Regulation"
    description: "Government directives, regulatory changes, standards updates"
    max_items: 5
    template: "sections/policy_compliance.mjml"
    filters:
      keywords: ["regulation", "compliance", "NIST", "GDPR", "SEC", "directive", "executive order", "framework"]
      sources: ["CISA Cybersecurity Advisories", "ENISA Publications", "NCSC UK Advisories"]
    enabled: true

  - id: ioc_appendix
    name: "IOC Appendix"
    description: "Structured table of indicators: IPs, domains, hashes, URLs, YARA references"
    max_items: 50
    template: "sections/ioc_appendix.mjml"
    filters:
      entity_types: ["ipv4", "ipv6", "domain", "url", "md5", "sha1", "sha256", "yara"]
    enabled: true

# --- Audience Tiers ---
audience_tiers:
  executive:
    name: "Executive Brief"
    description: "TL;DR only -- 2-minute read for CISOs"
    sections: ["executive_tldr"]
    format: "html"

  technical:
    name: "Full Technical Brief"
    description: "Complete newsletter with all 9 sections"
    sections: ["executive_tldr", "critical_vulns", "exploits_zerodays", "threat_actors", "breaches", "malware_tooling", "vendor_advisories", "policy_compliance", "ioc_appendix"]
    format: "html"

  ioc_feed:
    name: "IOC Feed"
    description: "Machine-readable IOC data in STIX 2.1 format"
    sections: ["ioc_appendix"]
    format: "stix"

# --- Email Rendering ---
rendering:
  # MJML compilation settings
  mjml:
    minify: true
    validation_level: "soft"

  # Severity color badges
  severity_colors:
    critical: "#dc2626"   # Red
    high: "#ea580c"       # Orange
    medium: "#ca8a04"     # Yellow
    low: "#2563eb"        # Blue
    info: "#6b7280"       # Gray

  # Max width for email layout
  max_width_px: 600

  # Include plaintext fallback
  plaintext_fallback: true

# --- Archive ---
archive:
  enabled: true
  format: "markdown"           # markdown | html
  output_dir: "./archive"
  # Keep archives for this many days
  retention_days: 365

# --- Delivery ---
delivery:
  # Simple SMTP (Gmail, Outlook, Fastmail, self-hosted, etc.)
  provider: "smtp"

  smtp:
    host: "${SMTP_HOST}"
    port: 587
    use_tls: true
    username: "${SMTP_USERNAME}"
    password: "${SMTP_PASSWORD}"

  # Retry settings
  max_retries: 3
  retry_delay_seconds: 60

  # Current subscriber count: ~20
  # No rate limiting needed at this scale

  # Include unsubscribe header (RFC 8058)
  include_list_unsubscribe: true
