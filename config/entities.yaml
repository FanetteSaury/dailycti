# =============================================================================
# DailyCTI -- Entity Knowledge Base
# =============================================================================
# Threat actor aliases and malware family names for fuzzy matching.
# Source: MITRE ATT&CK Enterprise (groups + software), supplemented by
# industry-standard naming conventions.
#
# Used by: src/fidlie/ai/entities.py (rapidfuzz matching)
# =============================================================================

# --- Threat Actor Aliases ---
# Maps canonical name to known aliases (all names used by vendors)
threat_actors:
  APT28:
    aliases: ["Fancy Bear", "Sofacy", "Sednit", "STRONTIUM", "Forest Blizzard", "Pawn Storm", "Tsar Team", "Group 74"]
    origin: "Russia"
    targets: ["government", "military", "media", "defense"]

  APT29:
    aliases: ["Cozy Bear", "NOBELIUM", "Midnight Blizzard", "The Dukes", "Dark Halo", "Cloaked Ursa", "UNC2452"]
    origin: "Russia"
    targets: ["government", "technology", "think tanks"]

  APT41:
    aliases: ["Double Dragon", "Winnti", "Barium", "Wicked Panda", "Brass Typhoon"]
    origin: "China"
    targets: ["technology", "healthcare", "gaming", "telecommunications"]

  Lazarus Group:
    aliases: ["HIDDEN COBRA", "Zinc", "Diamond Sleet", "Labyrinth Chollima", "APT38", "BlueNoroff", "Sapphire Sleet"]
    origin: "North Korea"
    targets: ["financial", "cryptocurrency", "defense", "technology"]

  Kimsuky:
    aliases: ["Velvet Chollima", "Emerald Sleet", "THALLIUM", "Black Banshee", "APT43"]
    origin: "North Korea"
    targets: ["government", "research", "think tanks", "media"]

  Sandworm:
    aliases: ["Voodoo Bear", "IRIDIUM", "Seashell Blizzard", "Telebots", "BlackEnergy Group", "UAC-0082"]
    origin: "Russia"
    targets: ["energy", "government", "critical infrastructure"]

  Volt Typhoon:
    aliases: ["BRONZE SILHOUETTE", "Vanguard Panda", "DEV-0391", "Insidious Taurus", "UNC3236"]
    origin: "China"
    targets: ["critical infrastructure", "telecommunications", "government"]

  Salt Typhoon:
    aliases: ["GhostEmperor", "FamousSparrow", "UNC2286"]
    origin: "China"
    targets: ["telecommunications", "ISPs", "government"]

  Scattered Spider:
    aliases: ["UNC3944", "Roasted 0ktapus", "Star Fraud", "Muddled Libra", "Octo Tempest"]
    origin: "USA/UK"
    targets: ["technology", "telecommunications", "gaming", "hospitality"]

  FIN7:
    aliases: ["Carbanak", "Carbon Spider", "Sangria Tempest", "ELBRUS"]
    origin: "Russia"
    targets: ["financial", "retail", "hospitality"]

  Turla:
    aliases: ["Snake", "Venomous Bear", "KRYPTON", "Secret Blizzard", "Waterbug", "WhiteBear"]
    origin: "Russia"
    targets: ["government", "military", "diplomatic"]

  MuddyWater:
    aliases: ["Mercury", "Mango Sandstorm", "TEMP.Zagros", "Seedworm", "Static Kitten"]
    origin: "Iran"
    targets: ["government", "telecommunications", "energy"]

  Charming Kitten:
    aliases: ["APT35", "Phosphorus", "Mint Sandstorm", "NEWSCASTER", "Ajax Security Team", "TA453"]
    origin: "Iran"
    targets: ["government", "academia", "media", "dissidents"]

  LockBit:
    aliases: ["LockBit 2.0", "LockBit 3.0", "LockBit Black", "LockBit Green"]
    origin: "Russia (ransomware group)"
    targets: ["all sectors"]

  BlackCat:
    aliases: ["ALPHV", "Noberus", "Sphynx"]
    origin: "Russia (ransomware group)"
    targets: ["all sectors"]

  Cl0p:
    aliases: ["Clop", "TA505", "FIN11", "Lace Tempest"]
    origin: "Russia (ransomware group)"
    targets: ["all sectors", "MOVEit", "file transfer"]

  Black Basta:
    aliases: ["Storm-0506", "Cardinal"]
    origin: "Russia (ransomware group)"
    targets: ["all sectors"]

  RansomHub:
    aliases: ["Cyclops", "Knight"]
    origin: "Unknown (ransomware group)"
    targets: ["all sectors"]

  Play:
    aliases: ["PlayCrypt", "Balloonfly"]
    origin: "Unknown (ransomware group)"
    targets: ["all sectors"]

