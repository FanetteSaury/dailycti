services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dailycti
      POSTGRES_USER: dailycti
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dailycti"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  dailycti-api:
    build: .
    command: fidlie api --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dailycti:${POSTGRES_PASSWORD}@postgres:5432/dailycti
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
      - ./templates:/app/templates:ro
      - ./archive:/app/archive

  dailycti-worker:
    build: .
    command: fidlie run
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dailycti:${POSTGRES_PASSWORD}@postgres:5432/dailycti
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
      - ./templates:/app/templates:ro
      - ./archive:/app/archive

volumes:
  postgres_data:
  redis_data:
